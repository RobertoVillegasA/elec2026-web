services:
  - type: web
    name: sistema-electoral-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web:app --worker-class uvicorn.workers.UvicornWorker --workers 2 --threads 4 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_HOST
        fromDatabase:
          name: sistema-electoral-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sistema-electoral-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sistema-electoral-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sistema-electoral-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sistema-electoral-db
          property: password
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://tu-frontend.onrender.com
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: sistema-electoral-db
    databaseName: sistema_electoral
    user: sistema_electoral_user
    plan: free
    region: oregon
